<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OfflineActionQueue Demo</title>
    <style>
        body {
            font-family: Segoe UI, Tahoma, sans-serif;
            margin: 0;
            padding: 2rem;
            background: #f6f8fc;
            color: #152238;
        }

        .card {
            max-width: 820px;
            margin: 0 auto;
            border: 1px solid #d6deef;
            border-radius: 12px;
            background: #fff;
            padding: 1.1rem;
            box-shadow: 0 8px 22px rgba(20, 40, 80, 0.08);
        }

        h1, h2 {
            margin-top: 0;
        }

        .row {
            display: grid;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .inline {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 0.75rem;
        }

        label {
            font-weight: 600;
            display: block;
            margin-bottom: 0.25rem;
        }

        input {
            width: 100%;
            border: 1px solid #c7d2e9;
            border-radius: 8px;
            padding: 0.55rem 0.7rem;
            box-sizing: border-box;
        }

        button {
            border: 0;
            background: #0a67ec;
            color: #fff;
            border-radius: 8px;
            padding: 0.6rem 0.9rem;
            cursor: pointer;
            font-weight: 600;
        }

        .muted {
            color: #51627a;
            font-size: 0.9rem;
        }

        .toolbar {
            display: flex;
            gap: 0.65rem;
            flex-wrap: wrap;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            font-size: 0.9rem;
            border: 1px solid #cfdbf3;
            border-radius: 999px;
            padding: 0.28rem 0.55rem;
            background: #f4f8ff;
        }

        pre {
            margin: 0;
            padding: 0.7rem;
            border-radius: 8px;
            background: #0f223a;
            color: #d2ecff;
            min-height: 130px;
            overflow: auto;
        }

        @media (max-width: 700px) {
            .inline {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body data-pp-observe-root-offline-action-queue>
    <main class="card"
        data-oaq-config='{"storageKey":"demo:oaq:tasks","maxRetries":6,"baseRetryDelayMs":800,"maxRetryDelayMs":10000,"autoFlushOnOnline":true,"autoFlushOnInit":true,"queueOnHttpErrors":true,"tryImmediate":true}'>
        <h1>OfflineActionQueue Demo</h1>
        <p class="muted">
            Simula red inestable: encola acciones de crear/editar y reintenta en orden cuando vuelve la conectividad.
        </p>

        <div class="row">
            <div class="toolbar">
                <label class="pill">
                    <input id="simulateFail" type="checkbox" checked />
                    Simular falla de red
                </label>
                <span class="pill">Queue size: <strong id="queueSize">0</strong></span>
                <button id="forceFlush" type="button">Forzar flush</button>
                <button id="clearQueue" type="button">Limpiar cola</button>
            </div>
        </div>

        <form id="taskForm"
            class="row"
            data-offline-action-queue
            data-oaq-endpoint="/api/tasks"
            data-oaq-method="POST"
            data-oaq-action-type="create"
            data-oaq-payload-mode="form">

            <h2>Crear tarea</h2>
            <div class="inline">
                <div>
                    <label for="title">Titulo</label>
                    <input id="title" name="title" required placeholder="Ej: Revisar contrato" />
                </div>
                <div>
                    <label for="owner">Responsable</label>
                    <input id="owner" name="owner" required placeholder="Ej: Ana" />
                </div>
            </div>
            <button type="submit">Crear (resiliente)</button>
        </form>

        <button id="deleteAction"
            type="button"
            data-offline-action-queue
            data-oaq-endpoint="/api/tasks/123"
            data-oaq-method="DELETE"
            data-oaq-action-type="delete"
            data-oaq-name-reason="cleanup">
            Eliminar tarea 123 (resiliente)
        </button>

        <div class="row" style="margin-top: 1rem;">
            <h2>Queue snapshot</h2>
            <pre id="snapshot"></pre>
        </div>

        <div class="row">
            <h2>Eventos</h2>
            <pre id="logs"></pre>
        </div>
    </main>

    <script src="./offlineActionQueue.js"></script>
    <script>
        (function () {
            var logsEl = document.getElementById('logs')
                , snapshotEl = document.getElementById('snapshot')
                , queueSizeEl = document.getElementById('queueSize')
                , simulateFailEl = document.getElementById('simulateFail')
                , forceFlushEl = document.getElementById('forceFlush')
                , clearQueueEl = document.getElementById('clearQueue')
                , taskFormEl = document.getElementById('taskForm')
                , deleteActionEl = document.getElementById('deleteAction')
                , originalFetch = window.fetch;

            function log(message) {
                var line = '[' + new Date().toLocaleTimeString() + '] ' + message;
                logsEl.textContent += line + '\n';
                logsEl.scrollTop = logsEl.scrollHeight;
            }

            function updateSnapshot() {
                var instance = window.OfflineActionQueue.getInstance(taskFormEl);
                if (!instance) return;
                var snapshot = instance.getQueueSnapshot();
                queueSizeEl.textContent = String(snapshot.length);
                snapshotEl.textContent = JSON.stringify(snapshot, null, 2);
            }

            window.fetch = function (url, init) {
                if (simulateFailEl.checked) {
                    return Promise.reject(new Error('Simulated network failure'));
                }

                return Promise.resolve(new Response(JSON.stringify({
                    ok: true,
                    endpoint: url,
                    method: init && init.method ? init.method : 'GET'
                }), {
                    status: 200,
                    headers: { 'Content-Type': 'application/json' }
                }));
            };

            [taskFormEl, deleteActionEl].forEach(function (target) {
                target.addEventListener('queued.plugin.offlineActionQueue', function (evt) {
                    log('queued -> ' + evt.detail.action.actionType + ' | queue=' + evt.detail.queueSize);
                    updateSnapshot();
                });

                target.addEventListener('sent.plugin.offlineActionQueue', function (evt) {
                    log('sent -> ' + evt.detail.action.actionType + ' | status=' + evt.detail.result.status);
                    updateSnapshot();
                });

                target.addEventListener('failed.plugin.offlineActionQueue', function (evt) {
                    log('failed -> ' + evt.detail.action.actionType + ' | status=' + evt.detail.result.status);
                    updateSnapshot();
                });

                target.addEventListener('conflict.plugin.offlineActionQueue', function (evt) {
                    log('conflict -> ' + evt.detail.action.actionType + ' | status=' + evt.detail.result.status);
                    updateSnapshot();
                });

                target.addEventListener('drained.plugin.offlineActionQueue', function () {
                    log('drained -> queue vacia');
                    updateSnapshot();
                });
            });

            forceFlushEl.addEventListener('click', function () {
                var instance = window.OfflineActionQueue.getInstance(taskFormEl);
                if (!instance) return;
                instance.flush().then(function (count) {
                    log('manual flush -> enviados=' + count);
                    updateSnapshot();
                });
            });

            clearQueueEl.addEventListener('click', function () {
                var instance = window.OfflineActionQueue.getInstance(taskFormEl);
                if (!instance) return;
                instance.clearQueue();
                log('cola limpiada manualmente');
                updateSnapshot();
            });

            simulateFailEl.addEventListener('change', function () {
                log('simulacion de red: ' + (simulateFailEl.checked ? 'falla activa' : 'red estable'));
                if (!simulateFailEl.checked) {
                    var instance = window.OfflineActionQueue.getInstance(taskFormEl);
                    instance && instance.flush();
                }
            });

            window.addEventListener('beforeunload', function () {
                window.fetch = originalFetch;
            });

            updateSnapshot();
            log('demo lista');
        })();
    </script>
</body>
</html>

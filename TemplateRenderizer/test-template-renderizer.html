<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Test - TemplateRenderizer</title>
  <style>
    body {
      font-family: Segoe UI, Tahoma, sans-serif;
      margin: 24px;
      line-height: 1.4;
      color: #222;
      background: #f6f8fa;
    }

    .layout {
      max-width: 780px;
      margin: 0 auto;
      display: grid;
      gap: 16px;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 12px;
    }

    label {
      font-size: 14px;
      display: grid;
      gap: 6px;
    }

    input {
      padding: 8px;
      border: 1px solid #bbb;
      border-radius: 6px;
    }

    button {
      padding: 9px 12px;
      border: 1px solid #aaa;
      border-radius: 6px;
      background: #f1f1f1;
      cursor: pointer;
      align-self: end;
    }

    #result {
      display: grid;
      gap: 10px;
    }

    .card {
      border: 1px solid #d5dbe2;
      background: #fff;
      border-radius: 10px;
      padding: 12px;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
    }

    .muted {
      color: #666;
      font-size: 14px;
      margin: 0;
    }
  </style>
</head>
<body>
  <main class="layout">
    <h1>Prueba de plugin <code>TemplateRenderizer</code></h1>
    <p class="muted">Completa datos y pulsa Renderizar para generar HTML usando placeholders.</p>

    <section class="controls" aria-label="controles de prueba">
      <label>
        Titulo
        <input id="title" type="text" value="Tarjeta de ejemplo" />
      </label>

      <label>
        Autor
        <input id="author" type="text" value="Samuel" />
      </label>

      <label>
        Email
        <input id="email" type="email" value="samuel@example.com" />
      </label>

      <button id="btnRender" type="button">Renderizar</button>
    </section>

    <section>
      <h2>Resultado</h2>
      <div id="result"></div>
    </section>

    <template id="cardTemplate">
      <article class="card">
        <h3>{{title}}</h3>
        <p><strong>Autor:</strong> {{author.name}}</p>
        <p><strong>Email:</strong> {{author.contact.email}}</p>
      </article>
    </template>
  </main>

  <script src="./templateRenderizer.min.js"></script>
  <script>
    const renderer = new templateRenderizer({
      templateSelector: '#cardTemplate'
    });

    function renderCard() {
      const data = {
        title: document.getElementById('title').value,
        author: {
          name: document.getElementById('author').value,
          contact: {
            email: document.getElementById('email').value
          }
        }
      };

      document.getElementById('result').innerHTML = renderer.render(data);
    }

    document.getElementById('btnRender').addEventListener('click', renderCard);

    renderCard();
  </script>
</body>
</html>
